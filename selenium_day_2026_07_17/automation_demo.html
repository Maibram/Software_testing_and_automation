<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .section { margin-bottom: 28px; }
        .product { border: 1px solid #ddd; padding: 12px; margin: 8px; width: 180px; display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="section">
        <h2>Contact Form</h2>
        <form id="contactForm">
            <input id="contactName" placeholder="Name" required /><br /><br />
            <input id="contactEmail" type="email" placeholder="Email" required /><br /><br />
            <input id="contactSubject" placeholder="Subject" required /><br /><br />
            <textarea id="contactMessage" placeholder="Message" required></textarea><br /><br />
            <button type="submit">Submit</button>
        </form>
        <p id="contactStatus"></p>
    </div>

    <div class="section">
        <h2>Login</h2>
        <form id="loginForm">
            <input id="loginEmail" type="email" placeholder="Email" required /><br /><br />
            <input id="loginPassword" type="password" placeholder="Password" required /><br /><br />
            <button type="submit">Login</button>
        </form>
        <p id="loginError"></p>
    </div>

    <div class="section">
        <h2>Registration</h2>
        <form id="registerForm">
            <input id="regName" placeholder="Full Name" required /><br /><br />
            <input id="regEmail" type="email" placeholder="Email" required /><br /><br />
            <input id="regPassword" type="password" placeholder="Password" required /><br /><br />
            <button type="submit">Register</button>
        </form>
        <p id="registerStatus"></p>
    </div>

    <div class="section">
        <h2>Products</h2>
        <select id="categoryFilter">
            <option value="all">All</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
        </select>
        <input id="priceFilter" type="range" min="10" max="200" value="200" />
        <span id="priceValue">200</span>
        <div id="productList">
            <div class="product" data-category="electronics" data-price="120"><h4>Laptop</h4><p>$120</p><button class="addToCart">Add to cart</button></div>
            <div class="product" data-category="clothing" data-price="40"><h4>T-Shirt</h4><p>$40</p><button class="addToCart">Add to cart</button></div>
            <div class="product" data-category="books" data-price="30"><h4>Python Book</h4><p>$30</p><button class="addToCart">Add to cart</button></div>
            <div class="product" data-category="electronics" data-price="80"><h4>Headphones</h4><p>$80</p><button class="addToCart">Add to cart</button></div>
        </div>
    </div>

    <div class="section">
        <h2>Cart</h2>
        <table>
            <thead>
                <tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th></tr>
            </thead>
            <tbody id="cartBody"></tbody>
        </table>
        <p id="cartTotal">Total: $0</p>
    </div>

    <div class="section">
        <h2>File Upload and Download</h2>
        <form id="fileForm">
            <input id="fileInput" type="file" accept=".png,.jpg,.jpeg" />
            <button type="submit">Upload</button>
        </form>
        <p id="uploadStatus"></p>
        <a id="downloadLink" href="sample_download.txt" download>Download sample</a>
    </div>

    <script>
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('contactStatus').textContent = 'Contact form submitted successfully.';
        });

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (email === 'invalid@example.com' && password === 'wrongpass') {
                document.getElementById('loginError').textContent = 'Your email or password is incorrect!';
            } else {
                document.getElementById('loginError').textContent = 'Login successful.';
            }
        });

        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('registerStatus').textContent = 'Account Created!';
        });

        const priceFilter = document.getElementById('priceFilter');
        const priceValue = document.getElementById('priceValue');
        const categoryFilter = document.getElementById('categoryFilter');
        const products = Array.from(document.querySelectorAll('.product'));
        function updateProducts() {
            const maxPrice = Number(priceFilter.value);
            const category = categoryFilter.value;
            priceValue.textContent = maxPrice;
            products.forEach(product => {
                const price = Number(product.dataset.price);
                const matchesPrice = price <= maxPrice;
                const matchesCategory = category === 'all' || product.dataset.category === category;
                product.classList.toggle('hidden', !(matchesPrice && matchesCategory));
            });
        }
        priceFilter.addEventListener('input', updateProducts);
        categoryFilter.addEventListener('change', updateProducts);

        const cart = {};
        document.querySelectorAll('.addToCart').forEach(button => {
            button.addEventListener('click', function () {
                const product = button.parentElement;
                const name = product.querySelector('h4').textContent;
                const price = Number(product.dataset.price);
                cart[name] = cart[name] || { price, qty: 0 };
                cart[name].qty += 1;
                renderCart();
            });
        });

        function renderCart() {
            const cartBody = document.getElementById('cartBody');
            cartBody.innerHTML = '';
            let total = 0;
            Object.entries(cart).forEach(([name, item]) => {
                const row = document.createElement('tr');
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                row.innerHTML = `<td>${name}</td><td>$${item.price}</td><td><input class="qtyInput" type="number" min="1" value="${item.qty}" /></td><td>$${itemTotal}</td>`;
                cartBody.appendChild(row);
            });
            document.getElementById('cartTotal').textContent = `Total: $${total}`;
            document.querySelectorAll('.qtyInput').forEach(input => {
                input.addEventListener('change', function () {
                    const row = input.closest('tr');
                    const name = row.children[0].textContent;
                    cart[name].qty = Number(input.value);
                    renderCart();
                });
            });
        }

        const fileForm = document.getElementById('fileForm');
        fileForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                document.getElementById('uploadStatus').textContent = 'Please choose a file.';
                return;
            }
            const ext = file.name.split('.').pop().toLowerCase();
            if (['png', 'jpg', 'jpeg'].includes(ext)) {
                document.getElementById('uploadStatus').textContent = 'Valid file uploaded successfully.';
            } else {
                document.getElementById('uploadStatus').textContent = 'Unsupported file format rejected.';
            }
        });
    </script>
</body>
</html>
